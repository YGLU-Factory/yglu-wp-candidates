name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from index.php
        id: version
        run: |
          VERSION=$(grep -oP 'Version: \K[0-9]+(?:\.[0-9]+)+' src/index.php)
          echo "VERSION=$VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Read dotenv
        id: dotenv
        uses: falti/dotenv-action@v1.1
        with:
          log-variables: true

      - name: Run build script
        run: ./bin/build.sh ${{ steps.dotenv.outputs.plugin_name }}

      - name: Rename ZIP file with version
        run: |
          mv target/${{ steps.dotenv.outputs.plugin_name }}.zip target/${{ steps.dotenv.outputs.plugin_name }}-v${{ steps.version.outputs.version }}.zip

      - name: Create release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: v${{ steps.version.outputs.version }}
          body: |
            Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false

      - name: Upload release asset
        id: upload-release-asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: target/${{ steps.dotenv.outputs.plugin_name }}-v${{ steps.version.outputs.version }}.zip
          asset_name: ${{ steps.dotenv.outputs.plugin_name }}-v${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip